<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnTime - Focus Guard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #000000;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Dashboard Screen */
        .screen {
            display: none;
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        .header {
            font-size: 32px;
            font-weight: bold;
            color: #FFFFFF;
            margin-bottom: 24px;
            margin-top: 16px;
        }

        .session-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
            overflow-y: auto;
        }

        .session-card {
            background-color: #1E1E1E;
            border-radius: 24px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .session-card:hover {
            transform: translateY(-4px);
            background-color: #2A2A2A;
        }

        .session-label {
            font-size: 12px;
            font-weight: 600;
            color: #999999;
            margin-bottom: 8px;
        }

        .session-time {
            font-size: 20px;
            font-weight: bold;
            color: #FFFFFF;
            margin-bottom: 12px;
        }

        .session-title {
            font-size: 16px;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 12px;
        }

        .session-apps {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .app-chip {
            background-color: #333333;
            color: #999999;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 32px;
        }

        .empty-text {
            font-size: 18px;
            font-weight: 600;
            color: #999999;
        }

        .empty-subtext {
            font-size: 14px;
            color: #999999;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-add {
            background-color: transparent;
            color: #FFFFFF;
            border: 2px solid #FFFFFF;
            padding: 16px;
            font-size: 16px;
        }

        .btn-add:hover {
            background-color: #1E1E1E;
        }

        .btn-save {
            background-color: #FFFFFF;
            color: #000000;
            margin-bottom: 12px;
        }

        .btn-save:hover {
            background-color: #F5F5F5;
        }

        .btn-delete {
            background-color: #FF5252;
            color: #FFFFFF;
            width: auto;
            flex: 0.5;
        }

        .btn-delete:hover {
            background-color: #FF1744;
        }

        .btn-back {
            background-color: transparent;
            color: #FFFFFF;
            border: none;
            padding: 8px;
            font-size: 24px;
            width: auto;
            cursor: pointer;
        }

        /* Edit Screen */
        .edit-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .edit-title {
            font-size: 18px;
            font-weight: bold;
            color: #FFFFFF;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: #999999;
            display: block;
            margin-bottom: 8px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            background-color: #2A2A2A;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: #999999;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            background-color: #333333;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .time-block {
            background-color: #1E1E1E;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .time-inputs {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .time-input-group {
            flex: 1;
        }

        .time-dash {
            font-size: 24px;
            color: #FFFFFF;
            text-align: center;
            flex: 0.1;
        }

        .blocked-apps-list {
            margin-bottom: 16px;
        }

        .app-item {
            background-color: #2A2A2A;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .app-name {
            color: #FFFFFF;
            font-size: 14px;
        }

        .app-delete-btn {
            background: none;
            border: none;
            color: #FF5252;
            font-size: 20px;
            cursor: pointer;
        }

        .app-add-row {
            display: flex;
            gap: 8px;
            background-color: #2A2A2A;
            border-radius: 12px;
            padding: 4px;
        }

        .app-add-row input {
            flex: 1;
            background: none;
            border: none;
            color: #FFFFFF;
            padding: 8px;
        }

        .app-add-row input::placeholder {
            color: #999999;
        }

        .app-add-row input:focus {
            outline: none;
        }

        .app-add-btn {
            background: none;
            border: none;
            color: #FFFFFF;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        /* Reminder Screen */
        .reminder-screen {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            text-align: center;
        }

        .reminder-header {
            font-size: 36px;
            font-weight: bold;
            color: #F5F5F5;
            margin-bottom: 32px;
        }

        .blocked-app-info {
            margin-bottom: 32px;
        }

        .blocked-app-label {
            font-size: 14px;
            color: #999999;
            margin-bottom: 12px;
        }

        .blocked-app-name {
            font-size: 18px;
            font-weight: bold;
            color: #FFFFFF;
        }

        .reminder-message {
            font-size: 24px;
            font-weight: bold;
            color: #FFFFFF;
            line-height: 1.5;
            margin: 32px 0;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .session-info {
            margin-bottom: 32px;
            color: #999999;
            font-size: 14px;
        }

        .session-info-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .session-info-time {
            font-size: 12px;
        }

        .btn-dismiss {
            background-color: #F5F5F5;
            color: #000000;
            font-weight: bold;
            margin-bottom: 16px;
            width: 100%;
            padding: 16px;
        }

        .btn-dismiss:hover {
            background-color: #FFFFFF;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444444;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Dashboard Screen -->
        <div class="screen active" id="dashboardScreen">
            <h1 class="header">OnTime</h1>
            
            <div class="session-list" id="sessionList">
                <div class="empty-state" id="emptyState">
                    <div class="empty-text">No sessions yet</div>
                    <div class="empty-subtext">Create your first focus session</div>
                </div>
            </div>

            <button class="btn btn-add" onclick="showEditScreen()">+ Add Session</button>
        </div>

        <!-- Edit Session Screen -->
        <div class="screen" id="editScreen">
            <div class="edit-header">
                <button class="btn-back" onclick="showDashboard()">←</button>
                <div class="edit-title">EDIT SESSION</div>
            </div>

            <div class="time-block">
                <div class="form-label">TIME BLOCK</div>
                <div class="time-inputs">
                    <div class="time-input-group">
                        <input type="text" class="form-input" id="startTime" placeholder="05:00 PM">
                    </div>
                    <div class="time-dash">–</div>
                    <div class="time-input-group">
                        <input type="text" class="form-input" id="endTime" placeholder="07:00 PM">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">TITLE</label>
                <input type="text" class="form-input" id="sessionTitle" placeholder="e.g., Doing Homework">
            </div>

            <div class="form-group">
                <label class="form-label">BLOCKED APPS</label>
                <div class="blocked-apps-list" id="blockedAppsList"></div>
                <div class="app-add-row">
                    <input type="text" id="newAppInput" placeholder="Add app name...">
                    <button class="app-add-btn" onclick="addBlockedApp()">+</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">REMINDER MESSAGE</label>
                <textarea class="form-textarea" id="reminderMessage" placeholder="Your motivational message..."></textarea>
            </div>

            <div class="button-row">
                <button class="btn btn-save" onclick="saveSession()">SAVE SESSION</button>
                <button class="btn btn-delete" id="deleteBtn" style="display: none;" onclick="deleteSession()">DELETE</button>
            </div>
        </div>

        <!-- Reminder Screen -->
        <div class="screen" id="reminderScreen">
            <div class="reminder-screen">
                <div class="reminder-header">Stay Focused!</div>
                
                <div class="blocked-app-info">
                    <div class="blocked-app-label">You tried to open:</div>
                    <div class="blocked-app-name" id="reminderAppName">TikTok</div>
                </div>

                <div class="reminder-message" id="reminderMessageDisplay">
                    Your future is being built right now. Stay focused on your homework. It depends on it. Be disciplined!
                </div>

                <div class="session-info">
                    <div class="session-info-title" id="reminderSessionTitle">Focus Session: Doing Homework</div>
                    <div class="session-info-time" id="reminderSessionTime">05:00 PM - 07:00 PM</div>
                </div>

                <button class="btn btn-dismiss" onclick="showDashboard()">Got it! Let's focus</button>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let sessions = JSON.parse(localStorage.getItem('ontime_sessions')) || [];
        let currentEditingSession = null;
        let blockedApps = [];

        // Initialize
        function init() {
            renderDashboard();
        }

        // Dashboard functions
        function renderDashboard() {
            const sessionList = document.getElementById('sessionList');
            const emptyState = document.getElementById('emptyState');

            if (sessions.length === 0) {
                sessionList.innerHTML = '';
                sessionList.appendChild(emptyState);
                return;
            }

            sessionList.innerHTML = sessions.map((session, index) => `
                <div class="session-card" onclick="editSession(${index})">
                    <div class="session-label">FOCUS SESSION</div>
                    <div class="session-time">${session.startTime} – ${session.endTime}</div>
                    <div class="session-title">${session.title}</div>
                    ${session.blockedApps.length > 0 ? `
                        <div class="session-apps">
                            ${session.blockedApps.slice(0, 2).map(app => `
                                <div class="app-chip">${app}</div>
                            `).join('')}
                            ${session.blockedApps.length > 2 ? `<div class="app-chip">+${session.blockedApps.length - 2}</div>` : ''}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // Navigation
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showDashboard() {
            showScreen('dashboardScreen');
            renderDashboard();
        }

        function showEditScreen(index = null) {
            currentEditingSession = index;
            blockedApps = [];

            if (index !== null) {
                const session = sessions[index];
                document.getElementById('startTime').value = session.startTime;
                document.getElementById('endTime').value = session.endTime;
                document.getElementById('sessionTitle').value = session.title;
                document.getElementById('reminderMessage').value = session.reminderMessage;
                blockedApps = [...session.blockedApps];
                document.getElementById('deleteBtn').style.display = 'block';
            } else {
                document.getElementById('startTime').value = '';
                document.getElementById('endTime').value = '';
                document.getElementById('sessionTitle').value = '';
                document.getElementById('reminderMessage').value = '';
                document.getElementById('deleteBtn').style.display = 'none';
            }

            renderBlockedApps();
            showScreen('editScreen');
        }

        function editSession(index) {
            showEditScreen(index);
        }

        // Blocked apps
        function renderBlockedApps() {
            const list = document.getElementById('blockedAppsList');
            list.innerHTML = blockedApps.map((app, index) => `
                <div class="app-item">
                    <div class="app-name">${app}</div>
                    <button class="app-delete-btn" onclick="removeBlockedApp(${index})">✕</button>
                </div>
            `).join('');
        }

        function addBlockedApp() {
            const input = document.getElementById('newAppInput');
            const app = input.value.trim();
            if (app && !blockedApps.includes(app)) {
                blockedApps.push(app);
                input.value = '';
                renderBlockedApps();
            }
        }

        function removeBlockedApp(index) {
            blockedApps.splice(index, 1);
            renderBlockedApps();
        }

        // Save/Delete
        function saveSession() {
            const startTime = document.getElementById('startTime').value.trim();
            const endTime = document.getElementById('endTime').value.trim();
            const title = document.getElementById('sessionTitle').value.trim();
            const reminderMessage = document.getElementById('reminderMessage').value.trim();

            if (!startTime || !endTime || !title) {
                alert('Please fill in all required fields');
                return;
            }

            const session = {
                id: currentEditingSession !== null ? sessions[currentEditingSession].id : Date.now().toString(),
                title,
                startTime,
                endTime,
                blockedApps,
                reminderMessage
            };

            if (currentEditingSession !== null) {
                sessions[currentEditingSession] = session;
            } else {
                sessions.push(session);
            }

            localStorage.setItem('ontime_sessions', JSON.stringify(sessions));
            showDashboard();
        }

        function deleteSession() {
            if (currentEditingSession !== null && confirm('Delete this session?')) {
                sessions.splice(currentEditingSession, 1);
                localStorage.setItem('ontime_sessions', JSON.stringify(sessions));
                showDashboard();
            }
        }

        // Reminder screen
        function showReminder(sessionIndex) {
            const session = sessions[sessionIndex];
            document.getElementById('reminderAppName').textContent = session.blockedApps[0] || 'App';
            document.getElementById('reminderMessageDisplay').textContent = session.reminderMessage;
            document.getElementById('reminderSessionTitle').textContent = `Focus Session: ${session.title}`;
            document.getElementById('reminderSessionTime').textContent = `${session.startTime} - ${session.endTime}`;
            showScreen('reminderScreen');
        }

        // Allow Enter key in inputs
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('newAppInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addBlockedApp();
            });
        });

        init();
    </script>
</body>
</html>
