name: ontime
description: A student-focused productivity app to guard focus during study sessions.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2
  flutter_local_notifications: ^17.2.2
  usage_stats: ^1.3.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  app_list: ^0.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
